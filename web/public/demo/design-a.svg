<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&amp;family=DM+Serif+Display&amp;family=DM+Mono&amp;display=swap');
    </style>
  </defs>

  <!-- Nav -->
  <rect width="800" height="52" fill="#0C0C0C"/>
  <rect x="32" y="14" width="24" height="24" rx="5" fill="url(#logoGrad)"/>
  <text x="64" y="32" font-family="DM Sans, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">Human Signal</text>
  <text x="580" y="31" font-family="DM Sans, sans-serif" font-size="12" fill="#A3A3A3">Docs</text>
  <rect x="620" y="16" width="80" height="28" rx="6" fill="none" stroke="#2A2A2A"/>
  <text x="636" y="34" font-family="DM Sans, sans-serif" font-size="12" fill="#A3A3A3">Earn USDC</text>
  <rect x="710" y="16" width="64" height="28" rx="6" fill="#10B981"/>
  <text x="720" y="34" font-family="DM Sans, sans-serif" font-size="12" font-weight="600" fill="#0C0C0C">Post task</text>

  <!-- Hero dark section -->
  <rect y="52" width="800" height="260" fill="#0C0C0C"/>

  <!-- Pill -->
  <rect x="290" y="80" width="220" height="24" rx="12" fill="#1A1A1A" stroke="#2A2A2A"/>
  <circle cx="305" cy="92" r="3" fill="#10B981"/>
  <text x="315" y="96" font-family="DM Mono, monospace" font-size="10" fill="#71717A">World ID · x402 · Base Sepolia</text>

  <!-- Headline -->
  <text x="400" y="155" font-family="DM Serif Display, serif" font-size="38" fill="#FFFFFF" text-anchor="middle" letter-spacing="-1.2">Human taste,</text>
  <text x="400" y="198" font-family="DM Serif Display, serif" font-size="38" fill="#FFFFFF" text-anchor="middle" letter-spacing="-1.2">cryptographically verified.</text>

  <!-- Subtitle -->
  <text x="400" y="235" font-family="DM Sans, sans-serif" font-size="14" fill="#71717A" text-anchor="middle">Post a judgment task. Real humans vote via World ID — one person, one vote.</text>
  <text x="400" y="255" font-family="DM Sans, sans-serif" font-size="14" fill="#71717A" text-anchor="middle">Workers paid automatically. Feedback quality builds reputation.</text>

  <!-- Steps bar -->
  <rect y="312" width="800" height="44" fill="#111111"/>
  <line y1="312" y2="312" x1="0" x2="800" stroke="#1F1F1F"/>
  <!-- Step 1 -->
  <circle cx="140" cy="334" r="11" fill="#1A1A1A" stroke="#2A2A2A"/>
  <text x="140" y="338" font-family="DM Sans, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="160" y="338" font-family="DM Sans, sans-serif" font-size="11" fill="#71717A">Set bounty per vote</text>
  <!-- Step 2 -->
  <circle cx="320" cy="334" r="11" fill="#1A1A1A" stroke="#2A2A2A"/>
  <text x="320" y="338" font-family="DM Sans, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="340" y="338" font-family="DM Sans, sans-serif" font-size="11" fill="#71717A">Choose max voters</text>
  <!-- Step 3 -->
  <circle cx="500" cy="334" r="11" fill="#1A1A1A" stroke="#2A2A2A"/>
  <text x="500" y="338" font-family="DM Sans, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="520" y="338" font-family="DM Sans, sans-serif" font-size="11" fill="#71717A">Pay upfront via x402</text>

  <!-- Form section -->
  <rect y="356" width="800" height="244" fill="#F9F8F5"/>

  <!-- Form card -->
  <rect x="160" y="384" width="480" height="188" rx="20" fill="#FFFFFF" stroke="#E8E5DE" stroke-width="1.5"/>
  <text x="192" y="418" font-family="DM Sans, sans-serif" font-size="16" font-weight="700" fill="#0C0C0C">Create judgment task</text>

  <!-- Input fields -->
  <rect x="192" y="434" width="416" height="36" rx="8" fill="#F9F8F5" stroke="#E8E5DE"/>
  <text x="204" y="456" font-family="DM Sans, sans-serif" font-size="12" fill="#9CA3AF">Which landing page converts better?</text>

  <rect x="192" y="480" width="200" height="36" rx="8" fill="#F9F8F5" stroke="#E8E5DE"/>
  <text x="204" y="502" font-family="DM Sans, sans-serif" font-size="12" fill="#9CA3AF">Option A</text>
  <rect x="408" y="480" width="200" height="36" rx="8" fill="#F9F8F5" stroke="#E8E5DE"/>
  <text x="420" y="502" font-family="DM Sans, sans-serif" font-size="12" fill="#9CA3AF">Option B</text>

  <!-- Submit button -->
  <rect x="192" y="528" width="416" height="36" rx="10" fill="#10B981"/>
  <text x="400" y="550" font-family="DM Sans, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">Post task — $2.00 USDC (20 votes × $0.10)</text>
</svg>
