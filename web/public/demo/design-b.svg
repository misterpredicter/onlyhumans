<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&amp;display=swap');
    </style>
  </defs>

  <!-- Nav — garish gradient, too tall -->
  <rect width="800" height="72" fill="#1a0a3e"/>
  <rect width="800" height="72" fill="url(#uglyGrad)" opacity="0.7"/>
  <defs>
    <linearGradient id="uglyGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF00FF"/>
      <stop offset="50%" stop-color="#00FFFF"/>
      <stop offset="100%" stop-color="#FFFF00"/>
    </linearGradient>
  </defs>

  <!-- Logo — wrong shape, too big -->
  <rect x="20" y="12" width="48" height="48" rx="2" fill="#FF6600"/>
  <text x="80" y="46" font-family="Comic Neue, cursive" font-size="22" font-weight="700" fill="#FFFF00" letter-spacing="3">HUMAN SIGNAL</text>

  <!-- Nav links — misaligned, wrong colors -->
  <text x="560" y="50" font-family="Comic Neue, cursive" font-size="16" fill="#FF00FF" text-decoration="underline">docs</text>
  <rect x="620" y="20" width="90" height="36" rx="2" fill="#FF0000"/>
  <text x="632" y="44" font-family="Comic Neue, cursive" font-size="14" font-weight="700" fill="#FFFFFF">EARN $$$</text>
  <rect x="718" y="24" width="70" height="30" rx="0" fill="#00FF00" stroke="#000000" stroke-width="2"/>
  <text x="726" y="44" font-family="Comic Neue, cursive" font-size="12" font-weight="700" fill="#000000">post</text>

  <!-- Hero — wrong bg color, bad spacing -->
  <rect y="72" width="800" height="240" fill="#2d0854"/>

  <!-- No pill — straight into headline, off-center -->
  <text x="60" y="140" font-family="Comic Neue, cursive" font-size="44" font-weight="700" fill="#00FF00" letter-spacing="2">human taste</text>
  <text x="180" y="195" font-family="Comic Neue, cursive" font-size="32" fill="#FFFF00">cryptographically verified!!</text>

  <!-- Subtitle — too big, wrong font, bad color -->
  <text x="50" y="245" font-family="Comic Neue, cursive" font-size="18" fill="#FF69B4">Post a judgment task!! Real humans vote.</text>
  <text x="50" y="270" font-family="Comic Neue, cursive" font-size="18" fill="#FF69B4">Workers get paid automatically :)</text>

  <!-- Steps — ugly boxes, inconsistent sizing -->
  <rect y="312" width="800" height="56" fill="#330066"/>
  <rect x="20" y="320" width="200" height="40" rx="0" fill="#FF0000" stroke="#FFFF00" stroke-width="2"/>
  <text x="35" y="346" font-family="Comic Neue, cursive" font-size="13" fill="#FFFFFF" font-weight="700">1. SET BOUNTY</text>
  <rect x="240" y="322" width="180" height="36" rx="20" fill="#0000FF"/>
  <text x="268" y="346" font-family="Comic Neue, cursive" font-size="12" fill="#FFFFFF">2. pick voters</text>
  <rect x="450" y="318" width="220" height="44" rx="4" fill="#008000" stroke="#FF00FF" stroke-width="3"/>
  <text x="475" y="346" font-family="Comic Neue, cursive" font-size="14" fill="#FFFF00" font-weight="700">3. PAY x402!!!</text>

  <!-- Form section — wrong bg -->
  <rect y="368" width="800" height="232" fill="#FFF0E0"/>

  <!-- Form card — no border radius, drop shadow via rect, misaligned -->
  <rect x="100" y="386" width="520" height="196" rx="4" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <rect x="104" y="390" width="520" height="196" rx="4" fill="#E0E0E0" opacity="0.5"/>

  <!-- Title — wrong alignment and style -->
  <text x="400" y="420" font-family="Comic Neue, cursive" font-size="20" font-weight="700" fill="#FF0000" text-anchor="middle" text-decoration="underline">CREATE TASK!!</text>

  <!-- Input — bad styling -->
  <rect x="130" y="436" width="460" height="40" rx="2" fill="#FFFFE0" stroke="#FF0000" stroke-width="2"/>
  <text x="145" y="462" font-family="Comic Neue, cursive" font-size="14" fill="#666666">type something here...</text>

  <!-- Options — uneven -->
  <rect x="130" y="488" width="180" height="36" rx="2" fill="#FFE4E1" stroke="#FF69B4" stroke-width="2"/>
  <text x="145" y="512" font-family="Comic Neue, cursive" font-size="13" fill="#FF0000">option a</text>
  <rect x="380" y="484" width="210" height="44" rx="12" fill="#E0FFE0" stroke="#00FF00" stroke-width="2"/>
  <text x="400" y="512" font-family="Comic Neue, cursive" font-size="15" fill="#008000" font-weight="700">OPTION B!!!</text>

  <!-- Submit — wrong color, too wide -->
  <rect x="100" y="540" width="540" height="44" rx="2" fill="#FF6600" stroke="#000000" stroke-width="2"/>
  <text x="370" y="568" font-family="Comic Neue, cursive" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">SUBMIT TASK NOW !!!</text>
</svg>
